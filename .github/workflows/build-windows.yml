name: Build Windows Executable

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build executable
      run: |
        pyinstaller --onefile --windowed --name "Comparador_Planilhas" --hidden-import "ttkbootstrap" --hidden-import "pandas" --hidden-import "rapidfuzz" --hidden-import "unidecode" --hidden-import "openpyxl" Main.py

    - name: Create release package
      run: |
        mkdir release
        copy dist\Comparador_Planilhas.exe release\
        @"
        ========================================
          COMPARADOR DE PLANILHAS - v1.0
        ========================================

        1. Duplo clique no Comparador_Planilhas.exe
        2. Selecione a primeira planilha (Excel)
        3. Selecione a segunda planilha (Excel)
        4. Digite o nome da coluna para comparacao
        5. Clique em Processar Planilhas
        6. Aguarde o processamento
        7. Baixe os resultados quando concluido

        OBSERVACOES:
        - As planilhas devem estar no formato Excel (.xlsx ou .xls)
        - A coluna informada deve existir em ambas as planilhas
        - O sistema usa fuzzy matching com precisao minima de 90%
        "@ | Out-File -FilePath release\COMO_USAR.txt -Encoding UTF8

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: Comparador_Planilhas_Windows
        path: release/
